<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recette Manager - Cahier de Recette</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1419; color: #e0e0e0; overflow: hidden; font-size: 14px;
    }
    .container { display: flex; flex-direction: column; height: 100vh; }
    .header {
      background: linear-gradient(to right, #1a1f26, #1e2329);
      border-bottom: 2px solid #01696f;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .header h1 { font-size: 16px; font-weight: 700; color: #01696f; text-transform: uppercase; }
    .header-nav { display: flex; gap: 8px; flex: 1; }
    .nav-btn {
      padding: 8px 16px; background: transparent; color: #d0d0d0; border: none;
      cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.3s;
    }
    .nav-btn:hover, .nav-btn.active { color: #01696f; border-bottom-color: #01696f; }
    .header-actions { display: flex; gap: 8px; margin-left: auto; }
    .main { flex: 1; overflow: hidden; }
    .content { height: 100%; overflow-y: auto; padding: 24px; }
    .card { background: #1a1f26; border-radius: 8px; padding: 16px; border: 1px solid #2a3038; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #2a3038; }
    th { padding: 12px; text-align: left; font-weight: 600; }
    td { padding: 12px; border-bottom: 1px solid #2a3038; }
    tr:hover { background: #151a1f; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #01696f; color: #fff; }
    .btn-primary:hover { background: #005a5f; }
    .btn-secondary { background: #3a4a52; color: #f0f0f0; }
    .btn-secondary:hover { background: #4a5a62; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal.open { display: flex; }
    .modal-content { background: #1a1f26; padding: 24px; border-radius: 8px; max-width: 600px; width: 90%; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%; padding: 8px 12px; background: #2a3038; color: #e0e0e0;
      border: 1px solid #3a4a52; border-radius: 6px; font-family: inherit;
    }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .alert-success { background: #10b981; color: #fff; }
    .alert-error { background: #ef4444; color: #fff; }
    .loading { text-align: center; padding: 24px; }
    .spinner { border: 3px solid #3a4a52; border-top: 3px solid #01696f;
      border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Recette Manager</h1>
      <div class="header-nav">
        <button class="nav-btn active" onclick="switchTab('cahiers')">Cahiers</button>
        <button class="nav-btn" onclick="switchTab('lots')">Lots</button>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openNewCahierModal()">+ Cahier</button>
        <button class="btn btn-secondary btn-sm" onclick="loadCahiers()">🔄 Sync</button>
      </div>
    </div>

    <div class="main">
      <div class="content">
        <div id="tab-cahiers"><div id="cahiers-list"></div></div>
        <div id="tab-lots" style="display: none;"><div id="lots-list"></div></div>
      </div>
    </div>
  </div>

  <div id="modal-cahier" class="modal">
    <div class="modal-content">
      <div style="font-size: 18px; font-weight: 600; margin-bottom: 16px;">Nouveau Cahier</div>
      <div class="form-group">
        <label>Numéro</label>
        <input type="text" id="cahier-numero" placeholder="ex: CAH-001">
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="cahier-nom" placeholder="ex: Cahier Dynamics">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="cahier-type">
          <option>Unitaire</option><option>Modulaire</option><option>Métier</option><option>Flux</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px;">
        <button class="btn btn-secondary" onclick="closeModal('modal-cahier')">Annuler</button>
        <button class="btn btn-primary" onclick="saveCahier()">Créer</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let cahiers = [];
    let lots = [];

    const api = {
      async get(path) {
        const res = await fetch(`${API_URL}${path}`);
        if (!res.ok) throw new Error(`Erreur API: ${res.status}`);
        return res.json();
      },
      async post(path, data) {
        const res = await fetch(`${API_URL}${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error(`Erreur API: ${res.status}`);
        return res.json();
      }
    };

    function switchTab(tabName) {
      document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
      document.getElementById(`tab-${tabName}`).style.display = 'block';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (tabName === 'cahiers') loadCahiers();
      if (tabName === 'lots') loadLots();
    }

    function openNewCahierModal() {
      document.getElementById('modal-cahier').classList.add('open');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('open');
    }

    async function loadCahiers() {
      try {
        const list = document.getElementById('cahiers-list');
        list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        cahiers = await api.get('/cahiers');
        let html = '<h2>Cahiers de Recette</h2>';
        if (cahiers.length === 0) {
          html += '<div class="alert alert-success">✅ Connecté à l\'API<br>Aucun cahier pour le moment.Créer-en un pour démarrer!</div>';
        } else {
          html += `<table><thead><tr><th>Numéro</th><th>Nom</th><th>Type</th><th>Actions</th></tr></thead><tbody>` +
            cahiers.map(c => `<tr><td>${c.numero}</td><td>${c.nom}</td><td>${c.type}</td><td><button class="btn btn-sm btn-secondary">Voir</button></td></tr>`).join('') +
            `</tbody></table>`;
        }
        list.innerHTML = html;
      } catch (error) {
        document.getElementById('cahiers-list').innerHTML = `<div class="alert alert-error">❌ ${error.message}</div>`;
      }
    }

    async function saveCahier() {
      try {
        const cahier = {
          numero: document.getElementById('cahier-numero').value,
          nom: document.getElementById('cahier-nom').value,
          type: document.getElementById('cahier-type').value,
          runs: [], modules: [], cases: []
        };
        await api.post('/cahiers', cahier);
        closeModal('modal-cahier');
        loadCahiers();
      } catch (error) {
        alert('❌ Erreur: ' + error.message);
      }
    }

    async function loadLots() {
      try {
        const list = document.getElementById('lots-list');
        list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        lots = await api.get('/lots');
        let html = '<h2>Lots</h2>';
        if (lots.length === 0) {
          html += '<div class="alert alert-success">✅ Connecté à l\'API<br>Aucun lot pour le moment.</div>';
        } else {
          html += `<table><thead><tr><th>Numéro</th><th>Nom</th></tr></thead><tbody>` +
            lots.map(l => `<tr><td>${l.numero}</td><td>${l.nom}</td></tr>`).join('') +
            `</tbody></table>`;
        }
        list.innerHTML = html;
      } catch (error) {
        document.getElementById('lots-list').innerHTML = `<div class="alert alert-error">❌ ${error.message}</div>`;
      }
    }

    window.onload = async () => {
      try {
        const health = await api.get('/health');
        console.log('✅ API Connected:', health);
        loadCahiers();
      } catch (error) {
        document.querySelector('.content').innerHTML = `<div class="alert alert-error">❌ ${error.message}</div>`;
      }
    };
  </script>
</body>
</html>
